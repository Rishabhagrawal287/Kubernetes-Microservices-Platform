# One shared Secret for everything, kept simple on purpose for a learning
# platform — every service gets every key via envFrom, even ones it doesn't
# use. Fine here since these are all internal dev credentials anyway; a real
# environment would split this into narrower, per-service secrets and pull
# real values from something like Vault or Sealed Secrets instead of plain
# YAML. That's a Phase 7 (hardening) concern, not a Phase 2b one.
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: microservices
type: Opaque
stringData:
  MONGO_ROOT_USER: root
  MONGO_ROOT_PASSWORD: example
  MONGO_URI: "mongodb://root:example@mongo:27017/users_db?authSource=admin"

  POSTGRES_USER: orders
  POSTGRES_PASSWORD: orders
  POSTGRES_DB: orders_db
  DATABASE_URL: "postgresql://orders:orders@postgres:5432/orders_db"

  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"

  REDIS_ADDR: "redis:6379"

  JWT_SECRET: "change-me-in-prod"
