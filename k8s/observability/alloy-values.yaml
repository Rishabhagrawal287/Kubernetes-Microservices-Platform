# Grafana Alloy replaces Promtail (EOL as of March 2, 2026) as the log
# shipping agent. Runs as a DaemonSet — one pod per node — since each
# instance needs to read that specific node's local container logs.

alloy:
  # River config: discover every pod in the cluster, tag each log line with
  # namespace/pod/container (kept deliberately small — three label
  # dimensions — to avoid Loki label-cardinality blowup), and push to Loki's
  # gateway.
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

  clusterRole:
    create: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

controller:
  type: daemonset
