apiVersion: v1
kind: Service
metadata:
  name: product-service
  labels:
    {{- include "product-service.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "product-service.labels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
