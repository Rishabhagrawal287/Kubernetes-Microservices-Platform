replicaCount: 2

image:
  repository: user-service
  tag: local
  pullPolicy: IfNotPresent

service:
  port: 3000

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Every key in this Secret gets injected as an env var (see templates/deployment.yaml)
envFromSecret: platform-secrets
